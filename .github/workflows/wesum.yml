name: WeSum Auto Runner

on:
  schedule:
    # 每小时运行一次（UTC 时间，北京时间 +8 小时）
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-wesum:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env from secrets
      run: |
        mkdir -p data logs
        cat > .env << EOF
        API_KEY=${{ secrets.API_KEY }}
        API_BASE_URL=${{ secrets.API_BASE_URL }}
        MODEL_ID=${{ secrets.MODEL_ID }}
        WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
        GITHUB_TOKEN=${{ secrets.PERSONAL_GITHUB_TOKEN }}
        EOF

    - name: Run WeSum
      run: python main.py

    - name: Commit data files
      if: always()
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add data/seen_articles.json || echo "No data file to commit"
        git add logs/ || echo "No logs to commit"
        git commit -m "chore: update seen articles [skip ci]" || echo "No changes to commit"
        git push
